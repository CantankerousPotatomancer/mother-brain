version: "3.9"

services:
  memory-postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - memory_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.docker.compose.project=memory-brain"

  ollama:
    image: ollama/ollama:latest
    container_name: memory-ollama
    restart: unless-stopped
    volumes:
      - memory_ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    labels:
      - "com.docker.compose.project=memory-brain"

  ollama-init:
    image: ollama/ollama:latest
    container_name: memory-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: "no"
    labels:
      - "com.docker.compose.project=memory-brain"

  memory-mcp:
    build: ./mcp
    container_name: memory-mcp
    restart: unless-stopped
    depends_on:
      memory-postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=memory-postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL}
    ports:
      - "${MCP_SERVER_PORT}:${MCP_SERVER_PORT}"
    labels:
      - "com.docker.compose.project=memory-brain"

volumes:
  memory_pgdata:
  memory_ollama_data:
